<body data-page="login" data-page-title="Member Access">
  <div id="app-shell">
    <div data-include="sidebar"></div>
    <main class="app-content">
      <div data-include="header"></div>
      <section class="container-fluid px-3 px-md-4 pb-4">
        <div class="content-card p-4 form-shell">
          <h2 class="h4">Membership Login</h2>
          <p>UI-only authentication frame for product demonstrations.</p>
          <form>
            <div class="mb-3"><label class="form-label">Email Address</label><input class="form-control" type="email" /></div>
            <div class="mb-3"><label class="form-label">Password</label><input class="form-control" type="password" /></div>
            <div class="d-flex justify-content-between align-items-center mb-3">
              <div class="form-check"><input class="form-check-input" type="checkbox" id="remember" /><label class="form-check-label" for="remember">Remember me</label></div>
              <a href="#">Forgot password?</a>
            </div>
            <button class="btn btn-brand w-100" type="button">Sign In</button>
          </form>
        </div>
      </section>
      <div data-include="footer"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
