<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Demo Dudes Inc. | Order Form</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;700;800&display=swap" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" />
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
</head>
<body data-page="funnel" data-page-title="Secure Checkout">
  <div id="app-shell">
    <div data-include="sidebar"></div>
    <main class="app-content">
      <div data-include="header"></div>
      <section class="container-fluid px-3 px-md-4 pb-4">
        <div class="content-card p-4 form-shell">
          <h2 class="h3">Complete Your Demo Dudes Order</h2>
          <p>Checkout UI-only for demo walkthroughs. Submit routes to the upsell step.</p>
          <form action="upsell.html">
            <h3 class="h5 mt-3">Customer Information</h3>
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">First Name</label><input class="form-control" type="text" /></div>
              <div class="col-md-6"><label class="form-label">Last Name</label><input class="form-control" type="text" /></div>
              <div class="col-12"><label class="form-label">Email</label><input class="form-control" type="email" /></div>
            </div>
            <h3 class="h5 mt-4">Billing Address</h3>
            <div class="row g-3">
              <div class="col-12"><label class="form-label">Street Address</label><input class="form-control" type="text" /></div>
              <div class="col-md-6"><label class="form-label">City</label><input class="form-control" type="text" /></div>
              <div class="col-md-3"><label class="form-label">State</label><input class="form-control" type="text" /></div>
              <div class="col-md-3"><label class="form-label">Zip</label><input class="form-control" type="text" /></div>
            </div>
            <h3 class="h5 mt-4">Payment Details</h3>
            <div class="row g-3">
              <div class="col-12"><label class="form-label">Card Number</label><input class="form-control" type="text" inputmode="numeric" /></div>
              <div class="col-md-4"><label class="form-label">Exp Month</label><input class="form-control" type="text" /></div>
              <div class="col-md-4"><label class="form-label">Exp Year</label><input class="form-control" type="text" /></div>
              <div class="col-md-4"><label class="form-label">CVV</label><input class="form-control" type="text" /></div>
            </div>
            <button class="btn btn-brand btn-lg mt-4 w-100" type="submit">Submit Order</button>
          </form>
        </div>
      </section>
      <div data-include="footer"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="assets/js/layout.js"></script>
</body>
</html>
