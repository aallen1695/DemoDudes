<body data-page="dns" data-page-title="Do Not Sell or Share">
  <div id="app-shell">
    <div data-include="sidebar"></div>
    <main class="app-content">
      <div data-include="header"></div>
      <section class="container-fluid px-3 px-md-4 pb-4">
        <div class="content-card p-4 form-shell">
          <h2 class="h4">Do Not Sell or Share My Personal Information</h2>
          <p>This is a demo preference center screen. Controls are visual and not connected to data pipelines.</p>
          <form>
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="optOutAds" checked />
              <label class="form-check-label" for="optOutAds">Opt out of audience-based advertising data sharing</label>
            </div>
            <div class="form-check form-switch mb-3">
              <input class="form-check-input" type="checkbox" id="optOutPersonalization" />
              <label class="form-check-label" for="optOutPersonalization">Limit personalized recommendation processing</label>
            </div>
            <div class="row g-3">
              <div class="col-md-6"><label class="form-label">Email</label><input class="form-control" type="email" /></div>
              <div class="col-md-6"><label class="form-label">State/Region</label><input class="form-control" type="text" /></div>
            </div>
            <button class="btn btn-brand mt-3" type="button">Save Preferences</button>
          </form>
        </div>
      </section>
      <div data-include="footer"></div>
    </main>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
